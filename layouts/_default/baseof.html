<!doctype html>
<html lang="{{ .Site.Language.LanguageCode | default site.Language.LanguageCode }}">
{{ partial "head/head.html" . }}
<body class="page-{{ .Kind }} section-{{ .Type }}">
  <a class="skip-link" href="#main-content">{{ if eq .Site.Language.Lang "es" }}Saltar al contenido{{ else }}Skip to content{{ end }}</a>
  <div class="site-shell">
    {{ partial "header/header.html" . }}
    <main id="main-content" class="page-main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer/footer.html" . }}
  </div>
  {{ partial "footer/script-footer.html" . }}
</body>
</html>
